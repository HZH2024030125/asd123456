                debugger;

                if (endTime - startTime > 50) {
                    try { document.body.innerHTML = '<div style="text-align:center;padding:100px 20px;color:#999;font-family:sans-serif;"><h2>⚠️ 调试器检测</h2><p>请关闭开发者工具后刷新页面</p></div>'; } catch (e) {}

        (function() {
            var _table = [];
            (function build() {
                var base = [];
                for (var i = 0; i < 24; i++) {
                    for (var j = 0; j < 60; j++) {
                        base.push(0x3E8 + (i << 3) + (j + (j << 1)));
                    }
                }
                for (var k = base.length - 1; k > 0; k--) {
                    var r = (k * 7 + 13) % (k + 1);
                    var tmp = base[k];
                    base[k] = base[r];
                    base[r] = tmp;
                }
                _table = base;
            })();

            function getPwd(h, m) {
                var idx = (h * 60 + m) * 3 % _table.length;
                var off = (h * 7 + m * 13) % 7;
                var val = _table[(idx + off) % _table.length];
                var mask = (h * 5 + m * 2) % 3;
                return (val - mask + 3).toString();
            }

            function getCandidates() {
                var now = new Date();
                var h = now.getHours(),
                    m = now.getMinutes();
                var cands = [],
                    seen = {};
                for (var off = -3; off <= 3; off++) {
                    var th = h,
                        tm = m + off;
                    if (tm >= 60) { tm -= 60;
                        th++; }
                    if (tm < 0) { tm += 60;
                        th--; }
                    th = ((th % 24) + 24) % 24;
                    var p = getPwd(th, tm);
                    if (!seen[p]) { seen[p] = true;
                        cands.push(p); }
                }
                return cands;
            }

            var LOCK_KEY = 'maozhonglun_pwd_verified';
            var overlay = document.getElementById('passwordLock');
            var input = document.getElementById('pwdInput');
            var confirmBtn = document.getElementById('pwdConfirmBtn');
            var errorEl = document.getElementById('pwdError');

            function isVerified() { try { return localStorage.getItem(LOCK_KEY) === 'true'; } catch (e) { return false; } }

            function setVerified() { try { localStorage.setItem(LOCK_KEY, 'true'); } catch (e) {} }

            function unlock() { overlay.classList.add('hidden');
                window.dispatchEvent(new CustomEvent('pwdUnlocked')); }

            function lock() { overlay.classList.remove('hidden'); if (input) setTimeout(function() { input.focus(); },
                200); }

            function verify(val) {
                var cands = getCandidates();
                for (var i = 0; i < cands.length; i++) { if (cands[i] === val) return true; }
                return false;
            }

            function doVerify() {
                var val = input.value.trim();
                if (!val) { errorEl.textContent = '⚠️ 请输入密码'; return; }
                if (!/^\d{4,6}$/.test(val)) { errorEl.textContent = '⚠️ 请输入 4~6 位数字'; return; }

                    unlock();
                    errorEl.textContent = '';
                    input.value = ''; } else { errorEl.textContent = '❌ 密码错误，请重试';
                    input.value = '';
                    input.focus(); }
            }

            if (isVerified()) { unlock(); } else { lock(); }
            confirmBtn.addEventListener('click', doVerify);
            input.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault();
                    doVerify(); } });
            input.addEventListener('input', function() { errorEl.textContent = ''; });
            overlay.addEventListener('click', function(e) { if (e.target === overlay) input.focus(); });

        function loadState() {
            try { var raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : null; } catch (e) { return null; }
        }

        function restoreShuffledByIds(ids) {
            var ordered = [],
                idSet = new Set(ids);
            ids.forEach(function(id) {
                var found = ALL_QUESTIONS.find(function(q) { return q.id === id; });
                if (found) ordered.push(found);
            });
            ALL_QUESTIONS.forEach(function(q) { if (!idSet.has(q.id)) ordered.push(q); });
            return ordered;
        }

        function getCurrentPool() { return currentQType === 'choice' ? ALL_QUESTIONS : SHORT_QUESTIONS; }

        function getDisplayQuestions() {
            var pool = getCurrentPool();
            if (mode === 'all') {
                var base = currentQType === 'choice' ? shuffledQuestions : pool;
                if (currentQType === 'choice' && reviewEnabled && reviewQueue.length > 0) {
                    var qSet = new Set(reviewQueue),
                        queueItems = [],
                        others = [];
                    reviewQueue.forEach(function(id) {
                        var q = ALL_QUESTIONS.find(function(qq) { return qq.id === id; });
                        if (q && !queueItems.some(function(item) { return item.id === id; })) queueItems.push(q);
                    });
                    base.forEach(function(q) { if (!qSet.has(q.id)) others.push(q); });
                    return queueItems.concat(others);
                }
                return base.slice();
            }
            if (mode === 'single') return currentQType === 'choice' ? shuffledQuestions.slice() : pool.slice();
            if (mode === 'errors') {
                if (currentQType === 'choice') {
                    var qs = [];
                    ALL_QUESTIONS.forEach(function(q) { if (errorCounts[q.id] && errorCounts[q.id] > 0) qs.push(q); });
                    qs.sort(function(a, b) { return (errorCounts[b.id] || 0) - (errorCounts[a.id] || 0); });
                    return qs;
                }
                return [];
            }
            if (mode === 'favorites') return pool.filter(function(q) { return favorites.has(q.id); });
            return [];
        }

        function getCurrentQuestion() {
            var qs = getDisplayQuestions();
            if (!qs || !qs.length) return null;
            if (mode === 'single') {
                if (singleIndex >= qs.length) singleIndex = 0;
                return qs[singleIndex] || null;
            }
            for (var i = 0; i < qs.length; i++) {
                if (!userAnswers[qs[i].id]) return qs[i];
            }
            return qs[0] || null;

            var cx = w / 2,
                cy = h / 2,
                r = Math.min(w, h) / 2 - 30,
                n = data.length;
            ctx.clearRect(0, 0, w, h);
            for (var lv = 1; lv <= 5; lv++) {
                var rr = r * (lv / 5);
                ctx.beginPath();
                for (var i = 0; i < n; i++) {
                    var ang = -Math.PI / 2 + (i / n) * 2 * Math.PI;
                    var x = cx + rr * Math.cos(ang),
                        y = cy + rr * Math.sin(ang);
                    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.strokeStyle = darkModeEnabled ? 'rgba(255,255,255,0.12)' : 'rgba(31,114,181,0.12)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
            ctx.beginPath();
            data.forEach(function(val, i) {
                var ang = -Math.PI / 2 + (i / n) * 2 * Math.PI;
                var rr2 = r * Math.min(val, 1);
                var x = cx + rr2 * Math.cos(ang),
                    y = cy + rr2 * Math.sin(ang);
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.closePath();
            ctx.fillStyle = darkModeEnabled ? 'rgba(31,114,181,0.25)' : 'rgba(31,114,181,0.2)';
            ctx.fill();
            ctx.strokeStyle = darkModeEnabled ? '#6a9ec7' : '#1f72b5';
            ctx.lineWidth = 2.5;
            ctx.stroke();

            var labelColor = darkModeEnabled ? '#e8edf3' : '#142433';
            ctx.fillStyle = labelColor;
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            data.forEach(function(val, i) {
                var ang = -Math.PI / 2 + (i / n) * 2 * Math.PI;
                var x = cx + (r + 20) * Math.cos(ang),
                    y = cy + (r + 20) * Math.sin(ang);
                ctx.fillText(chapters[i].replace('第', '').replace('章', ''), x, y);
                if (val > 0.01) {
                    var pct = Math.round(val * 100);
                    var px = cx + (r * val - 15) * Math.cos(ang),
                        py = cy + (r * val - 15) * Math.sin(ang);
                    ctx.fillStyle = val > 0.7 ? '#1f8b4a' : val > 0.4 ? '#f59e0b' : '#b13e38';
                    ctx.font = 'bold 11px sans-serif';
                    ctx.fillText(pct + '%', px, py);
                }
            });
        }

        function toggleReport() {
            reportVisible = !reportVisible;
            reportPanel.classList.toggle('hidden', !reportVisible);
            reportToggle.textContent = reportVisible ? '📊 隐藏报告' : '📊 报告';
            if (reportVisible) renderReport();
            saveState();
        }

        // ===== 手势控制（真正可用） =====
        function startGesture(stream) {
            if (typeof Hands === 'undefined' || typeof Camera === 'undefined') {
                alert('手势库加载失败，请检查网络连接或刷新页面重试。');
                return;
            }
            cameraStream = stream;
            cameraVideo.srcObject = stream;
            cameraVideo.play();
            cameraPreview.classList.add('active');
            cameraEnabled = true;
            cameraToggle.textContent = '📷 停止手势';
            cameraToggle.classList.add('btn-success');

            hands = new Hands({
                locateFile: function(file) {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.6
            });

            hands.onResults(onHandResults);

            cam = new Camera(cameraVideo, {
                onFrame: async function() {
                    await hands.send({ image: cameraVideo });
                },
                width: 320,
                height: 240
            });
            cam.start();
            showToast('✋ 手势已启动（逐题模式下左右挥手翻页，五指张开朗读）');
        }

        function stopGesture() {
            if (cam) { cam.stop();
                cam = null; }
            if (hands) { hands.close();
                hands = null; }
            if (cameraStream) {
                cameraStream.getTracks().forEach(function(t) { t.stop(); });
                cameraStream = null;
                cameraVideo.srcObject = null;
            }
            cameraPreview.classList.remove('active');
            cameraEnabled = false;
            cameraToggle.textContent = '📷 手势';
            cameraToggle.classList.remove('btn-success');
            lastHandX = null;
            showToast('📷 手势已关闭');
        }

        function onHandResults(results) {
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                lastHandX = null;
                return;
            }
            var landmarks = results.multiHandLandmarks[0];
            // 手掌中心（手腕+指根平均）
            var cx = 0,
                cy = 0;
            var indices = [0, 5, 9, 13, 17];
            for (var i = 0; i < indices.length; i++) {
                cx += landmarks[indices[i]].x;
                cy += landmarks[indices[i]].y;
            }
            cx /= indices.length;
            cy /= indices.length;

            // 检测五指张开
            var thumbOpen = landmarks[4].x < landmarks[3].x - 0.02;
            var tips = [8, 12, 16, 20];
            var bases = [6, 10, 14, 18];
            var openCount = 0;
            if (thumbOpen) openCount++;
            for (var j = 0; j < tips.length; j++) {
                if (landmarks[tips[j]].y < landmarks[bases[j]].y - 0.02) {
                    openCount++;
                }
            }
            if (openCount >= 5 && !gestureCooldown) {
                gestureCooldown = true;
                var q = getCurrentQuestion();
                if (q && speech.enabled) {
                    var txt = q.question;
                    if (q.options) txt += '，' + q.options.join('，');
                    speech.speak(txt);
                } else if (q && !speech.enabled) {
                    showToast('🔊 请先开启朗读');
                }
                setTimeout(function() { gestureCooldown = false; }, 2000);
            }

            // 左右翻页（仅逐题模式）
            if (mode !== 'single') return;
            if (lastHandX === null) {
                lastHandX = cx;
                return;
            }
            var diff = cx - lastHandX;
            var threshold = 0.08;
            if (Math.abs(diff) > threshold && !gestureCooldown) {
                gestureCooldown = true;
                if (diff > 0) {
                    document.getElementById('nextSingle')?.click();
                } else {
                    document.getElementById('prevSingle')?.click();
                }
                lastHandX = cx;
                setTimeout(function() { gestureCooldown = false; }, 1000);
            } else {
                lastHandX = lastHandX * 0.7 + cx * 0.3;
            }
        }

        function toggleCamera() {
            if (!cameraEnabled) {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 320 }, height: { ideal: 240 } } })
                    .then(function(stream) {
                        startGesture(stream);
                    })
                    .catch(function(err) {
                        alert('无法访问摄像头: ' + err.message);
                        cameraEnabled = false;
                        cameraToggle.textContent = '📷 手势';
                        cameraToggle.classList.remove('btn-success');
                    });
            } else {
                stopGesture();
            }
        }

        // ===== Toast =====
        function showToast(msg) {
            var t = document.createElement('div');
            t.textContent = msg;
            t.style.cssText =
                'position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:#fff; padding:12px 28px; border-radius:40px; font-size:18px; z-index:9999; pointer-events:none;';
            document.body.appendChild(t);
            setTimeout(function() { t.remove(); }, 1500);
        }

        // ===== 快捷键 =====
        function initShortcuts() {
            document.addEventListener('keydown', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                var k = e.key;
                if (k === 'ArrowLeft') { document.getElementById('prevSingle')?.click();
                    e.preventDefault(); return; }
                if (k === 'ArrowRight') { document.getElementById('nextSingle')?.click();
                    e.preventDefault(); return; }
                if (k === ' ') { e.preventDefault(); var btn = document.querySelector('.btn-toggle-answer'); if (btn)
                        btn.click(); return; }
                if (/^[1-4]$/.test(k)) {
                    var idx = parseInt(k) - 1;
                    var labels = document.querySelectorAll('.options label:not(.disabled)');
                    if (labels[idx]) { var inp = labels[idx].querySelector('input'); if (inp && !inp.disabled) { inp
                            .checked = true;
                            inp.dispatchEvent(new Event('change', { bubbles: true })); } }
                    e.preventDefault();
                    return;
                }
                var map = { 's': 'single', 'a': 'all', 'e': 'errors', 'f': 'favorites', 'r': function() { document
                            .getElementById('resetBtn')?.click(); }, 'h': function() { document.querySelector(
                            'input[name="qtype"][value="short"]')?.click(); }, 'c': function() { document
                            .querySelector('input[name="qtype"][value="choice"]')?.click(); } };
                if (k.toLowerCase() in map) {
                    var act = map[k.toLowerCase()];
                    if (typeof act === 'function') { act();
                        e.preventDefault(); return; }
                    var radio = document.querySelector('input[name="mode"][value="' + act + '"]');
                    if (radio) { radio.checked = true;
                        radio.dispatchEvent(new Event('change', { bubbles: true }));
                        e.preventDefault(); return; }
                }
                if (k === '?' || k === '/') {
                    alert('⌨️ 快捷键：\n← → 切换题目\n空格 显示答案\n1-4 选选项\nS 逐题 A 全部 E 错题集 F 收藏\nR 重置 H 简答题 C 选择题');
                    e.preventDefault();
                }
            });
        }

        // ================================================================
        // 🎨 渲染函数（完整版）
        // ================================================================
        function render() {
            if (!window.__pwdLock || !window.__pwdLock.isVerified()) return;
            if (!shuffledQuestions || shuffledQuestions.length === 0) shuffledQuestions = shuffleArray(ALL_QUESTIONS);

            qtypeRadios.forEach(function(r) { if (r.value === currentQType) r.checked = true; });
            modeRadios.forEach(function(r) { if (r.value === mode) r.checked = true; });
            elReviewToggle.checked = reviewEnabled;

            document.querySelectorAll('.mode-option').forEach(function(el) {
                var types = el.dataset.type.split(' ');
                if (types.indexOf('short') === -1 && currentQType === 'short' && el.querySelector('input').value ===
                    'errors') {
                    el.style.display = 'none';
                } else { el.style.display = ''; }
            });

            if (mode === 'errors' && currentQType === 'choice') {
                var errs = getDisplayQuestions();
                if (errs.length === 0) { mode = 'all';
                    document.querySelector('input[name="mode"][value="all"]').checked = true; }
            }
            if (mode === 'favorites') {
                var favs = getDisplayQuestions();
                if (favs.length === 0) { mode = 'all';
                    document.querySelector('input[name="mode"][value="all"]').checked = true; }
            }

            var qs = getDisplayQuestions();
            var modeLabel = mode === 'all' ? '全部展示' : mode === 'single' ? '逐题模式' : mode === 'errors' ? '错题集' :
            '收藏';
            var typeLabel = currentQType === 'choice' ? '选择题' : '简答题';
            var reviewLabel = (currentQType === 'choice' && reviewEnabled && reviewQueue.length > 0) ?
                ' [错题重现 ' + reviewQueue.length + '题]' : (currentQType === 'choice' && !reviewEnabled ? ' [错题重现已关闭]' :
                '');
            elModeStatus.textContent = typeLabel + ' · ' + modeLabel + ' (共 ' + qs.length + ' 题)' + reviewLabel;

            if (currentQType === 'short' || mode === 'favorites') { statsBar.style.display = 'none'; } else { statsBar
                    .style.display = 'flex'; }

            if (mode === 'single') { elSingleNav.classList.remove('hidden');
                elSwipeHint.classList.add('show'); } else { elSingleNav.classList.add('hidden');
                elSwipeHint.classList.remove('show'); }

            if (mode === 'errors' && currentQType === 'choice') {
                elErrorContainer.classList.remove('hidden');
                elRefreshErrors.style.display = 'inline-block';
                elRefreshErrors2.style.display = 'inline-block';
            } else {
                elErrorContainer.classList.add('hidden');
                elRefreshErrors.style.display = 'none';
                elRefreshErrors2.style.display = 'none';
            }

            if (mode === 'errors' && currentQType === 'choice') {
                renderErrorQuestions(qs);
                updateErrorStats();
                elErrorGoTop.classList.toggle('show', qs.length > 3);
            } else if (mode === 'single') {
                renderSingleQuestion(qs);
            } else {
                if (currentQType === 'choice') renderChoiceList(qs);
                else renderShortList(qs);
            }

            updateStats(qs);
            updateScoreDisplay(qs);
            updateGoTopVisibility();
            saveState();

            if (speech.enabled) {
                var q = getCurrentQuestion();
                if (q) {
                    var txt = q.question;
                    if (q.options) txt += '，' + q.options.join('，');
                    speech.speak(txt);
                }
            }
            if (reportVisible) renderReport();
        }
